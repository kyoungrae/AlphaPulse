# AlphaPulse — run on a LAN machine (e.g. Windows Docker Desktop at 192.168.0.232)
#
# Usage (repo root):
#   docker compose build
#   docker compose up -d
# Open from another PC on the same LAN:
#   http://192.168.0.232:4001
#
# Optional: copy backend/.env.example → backend/.env and set secrets.
# The api service loads ./backend/.env automatically (see env_file below).

services:
  predict:
    image: alphapulse/predict:local
    platform: linux/amd64
    build:
      context: ./ai_model
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_BASE_URL: http://api:4001
      FINBERT_ENABLED: "false"
    ports:
      - "8001:8001"

  api:
    image: alphapulse/api:local
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - predict
    # Optional: copy Mac `backend/.env` here so Firebase etc. apply without extra `docker run` flags.
    # `required: false` needs Docker Compose v2.24+ (Docker Desktop 2024+).
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: "4001"
      PREDICT_URL: http://predict:8001
      FRONTEND_DIST: /app/frontend/dist
      # Optional overrides; most values come from backend/.env via env_file above.
      # If .env uses a file path for GOOGLE_APPLICATION_CREDENTIALS, that path must exist
      # inside the container — mount your JSON (see volumes) or use FIREBASE_SERVICE_ACCOUNT_JSON in .env.
      # GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-adminsdk.json
    ports:
      - "0.0.0.0:4001:4001"
    # Firestore: `backend/.env` alone is not enough if GOOGLE_APPLICATION_CREDENTIALS points to a Mac path
    # or a file that is not inside the image. Put the JSON next to `.env` under `backend/`, uncomment below,
    # and set in `backend/.env`: GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/firebase.json
    # volumes:
    #   - ./backend/your-service-account.json:/run/secrets/firebase.json:ro
